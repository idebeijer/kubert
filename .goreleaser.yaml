# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - ./scripts/completions.sh

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s"
      - "-w"
      - "-X github.com/idebeijer/kubert/pkg/versions.Version={{ .Version }}"
      - "-X github.com/idebeijer/kubert/pkg/versions.Commit={{ .Commit }}"
      - "-X github.com/idebeijer/kubert/pkg/versions.Date={{ .Date }}"
      - "-X github.com/idebeijer/kubert/pkg/versions.BuiltBy=goreleaser"

nfpms:
  - package_name: kubert
    maintainer: "Igor de Beijer <71566757+idebeijer@users.noreply.github.com>"
    vendor: "Igor de Beijer"
    homepage: "https://github.com/idebeijer/kubert"
    description: "A kubectx and kubens alternative with context isolation, multi-cluster execution and more."
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    suggests:
      - kubectl
      - fzf
    contents:
      - src: "completions/kubert.bash"
        dst: "/usr/share/bash-completion/completions/kubert"
      - src: "completions/kubert.zsh"
        dst: "/usr/share/zsh/site-functions/_kubert"
      - src: "completions/kubert.fish"
        dst: "/usr/share/fish/vendor_completions.d/kubert.fish"

archives:
  - id: completions
    files:
      - LICENSE*
      - completions/*

homebrew_casks:
  - repository:
      owner: idebeijer
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/idebeijer/kubert"
    completions:
      bash: completions/kubert.bash
      zsh: completions/kubert.zsh
      fish: completions/kubert.fish
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kubert"]
          end

aurs:
  - name: kubert-bin
    homepage: "https://github.com/idebeijer/kubert"
    description: "A kubectx and kubens alternative with context isolation, multi-cluster execution and more."
    license: "MIT"
    maintainers:
      - "Igor de Beijer <71566757+idebeijer@users.noreply.github.com>"
    git_url: "ssh://aur@aur.archlinux.org/kubert-bin.git"
    private_key: "{{ .Env.AUR_KEY }}"
    package: |-
      # bin
      install -Dm755 "kubert" "${pkgdir}/usr/bin/kubert"

      # license
      install -Dm644 "LICENSE" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"

      # completions
      mkdir -p "${pkgdir}/usr/share/bash-completion/completions/"
      mkdir -p "${pkgdir}/usr/share/zsh/site-functions/"
      mkdir -p "${pkgdir}/usr/share/fish/vendor_completions.d/"

      install -Dm644 "./completions/kubert.bash" "${pkgdir}/usr/share/bash-completion/completions/kubert"
      install -Dm644 "./completions/kubert.zsh" "${pkgdir}/usr/share/zsh/site-functions/_kubert"
      install -Dm644 "./completions/kubert.fish" "${pkgdir}/usr/share/fish/vendor_completions.d/kubert.fish"

signs:
  - id: cosign
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

release:
  footer: |
    **Full Changelog**: https://github.com/idebeijer/kubert/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  sort: asc
  use: github
  groups:
    - title: "Breaking changes"
      regexp: '^.*?\w+(\(.+\))?!:\s?.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 1
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 2
    - title: "Documentation"
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 3
    - title: "Build system"
      regexp: '^.*?(build|ci)(\(.+\))??!?:.+$'
      order: 4
    - title: "Others"
      order: 999
  filters:
    exclude:
      - '^.*?(test|style)(\(.+\))??!?:.+$'
      - "initial commit"
